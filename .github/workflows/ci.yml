name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository / Получить репозиторий
        uses: actions/checkout@v4
      - name: Set up Node.js / Настроить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run product checks / Запустить проверки продукта
        run: npm run check
      - name: Validate Cloudflare bundle / Проверить сборку Cloudflare
        run: npm run deploy:dry-run
