name: Manual public-repository deployment

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository / Получить репозиторий
        uses: actions/checkout@v7
      - name: Set up Node.js / Настроить Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Validate product / Проверить продукт
        run: npm run check
      - name: Deploy with repository secrets / Опубликовать через секреты репозитория
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
